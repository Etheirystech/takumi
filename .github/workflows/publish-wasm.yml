name: Publish @etheirystech/takumi-wasm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
        default: patch

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build-and-publish:
    name: Build WASM and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        working-directory: takumi-wasm
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION"
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add takumi-wasm/package.json
          git commit -m "Bump takumi-wasm to ${{ steps.version.outputs.version }}"
          git push

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          stage: build

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Decode bundle key
        run: echo "${{ secrets.ASSET_BUNDLE_KEY }}" | xxd -r -p > takumi-wasm/src/bundle_key.bin

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter ./takumi-wasm

      - name: Build WASM
        working-directory: takumi-wasm
        run: bun run build

      - name: Verify build output
        working-directory: takumi-wasm
        run: |
          echo "Checking for required files..."
          ls -la pkg/takumi_wasm_bg.wasm pkg/takumi_wasm.js pkg/takumi_wasm.d.ts pkg/takumi_wasm.cjs
          echo ""
          echo "WASM size:"
          du -h pkg/takumi_wasm_bg.wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare package for publish
        working-directory: takumi-wasm
        run: |
          # Remove pkg/.gitignore created by wasm-pack (npm respects it and excludes pkg/ files)
          rm -f pkg/.gitignore

          # Write publish package.json with @etheirystech scope
          node -e "
            const pkg = {
              name: '@etheirystech/takumi-wasm',
              version: '${{ steps.version.outputs.version }}',
              description: 'Custom fork of @takumi-rs/wasm with extended CSS support (WASM build for browser)',
              license: '(MIT OR Apache-2.0)',
              exports: {
                '.': {
                  node: { types: './bundlers/node.d.ts', import: './bundlers/node.mjs', require: './bundlers/node.cjs' },
                  types: './pkg/takumi_wasm.d.ts',
                  import: './pkg/takumi_wasm.js',
                  require: './pkg/takumi_wasm.cjs',
                  default: './pkg/takumi_wasm.js'
                },
                './no-bundler': {
                  types: './pkg/takumi_wasm.d.ts',
                  import: './pkg/takumi_wasm.js',
                  require: './pkg/takumi_wasm.cjs',
                  default: './pkg/takumi_wasm.cjs'
                },
                './node': { types: './bundlers/node.d.ts', import: './bundlers/node.mjs', require: './bundlers/node.cjs' },
                './takumi_wasm_bg.wasm': { types: './pkg/takumi_wasm_bg.wasm.d.ts', default: './pkg/takumi_wasm_bg.wasm' },
                './next': { types: './bundlers/next.d.ts', default: './bundlers/next.js' }
              },
              files: ['README.md', 'pkg/takumi*', 'bundlers/*']
            };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Verify pkg files will be included
          echo "Files that will be published:"
          npx npm-packlist 2>/dev/null || ls -la pkg/ bundlers/ README.md

      - name: Publish to npm
        working-directory: takumi-wasm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload WASM to R2
        run: npx wrangler r2 object put ultimate-tcg-card-maker/wasm/renderer_${{ steps.version.outputs.version }}.wasm --file=takumi-wasm/pkg/takumi_wasm_bg.wasm --content-type=application/wasm
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
