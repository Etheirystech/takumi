<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,255,1.000)"/>
    <rect x="0" y="0" width="100" height="100" fill="rgba(0,0,0,1.000)" filter="url(#shadow1)"/>
    <rect x="0" y="0" width="100" height="100" fill="rgba(255,0,0,1.000)"/>
<defs>
    <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
        <feOffset dx="5" dy="5" result="offsetblur"/>
        <feFlood flood-color="rgba(0,0,0,0.5019608)"/>
        <feComposite in2="offsetblur" operator="in"/>
        <feMerge>
            <feMergeNode/>
        </feMerge>
    </filter>
</defs>
</svg>
