<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="10" dy="10" result="offsetblur" />
      <feFlood flood-color="rgba(0,0,0,0.5019608)" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
      </feMerge>
    </filter>
  </defs>
<rect x="0" y="0" width="200" height="200" fill="rgba(0,0,0,1)" filter="url(#shadow1)"/>
<rect x="0" y="0" width="200" height="200" fill="rgba(255,255,255,1)"/>
</svg>
